    {
            "position_a": { "x": 10, "y": 0, "z": 10 },
            "position_b": { "x": 20, "y": 0, "z": 20 }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
