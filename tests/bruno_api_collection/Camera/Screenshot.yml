info:
  name: Screenshot
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseURL}}/api/v1/camera/screenshot"
  body:
    type: json
    data: |-
      {
        "format": "png",
        "hide_ui": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
