title: '### :material-flask: Исследования'
desc: |-
  Управляет научным прогрессом колонии. Этот контроллер позволяет просматривать текущее
  состояние дерева технологий и мгновенно разблокировать технологии.
/api/v1/research/progress:
  desc: |-
    Возвращает информацию о текущем активном исследовательском проекте,
    включая его прогресс, необходимые очки исследования и статус.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/research/progress'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "name": "Microelectronics",
            "label": "Microelectronics",
            "progress": 500,
            "research_points": 3000,
            "description": "Build advanced components and electronics.",
            "is_finished": false,
            "can_start_now": true,
            "player_has_any_appropriate_research_bench": true,
            "required_analyzed_thing_count": 0,
            "analyzed_things_completed": 0,
            "tech_level": "Industrial",
            "prerequisites": ["Electricity"],
            "hidden_prerequisites": [],
            "required_by_this": ["Fabrication", "AdvancedMachining"],
            "progress_percent": 0.16666667
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12T10:00:00.0000000Z"
    }
    ```
  method: GET
/api/v1/research/finished:
  desc: |-
    Возвращает список всех исследовательских проектов, которые были успешно
    завершены игроком.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/research/finished'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "finished_projects": [
                "electricity",
                "basic_research",
                "stonecutting"
            ]
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12T10:00:00.0000000Z"
    }
    ```
  method: GET
/api/v1/research/tree:
  desc: |-
    Возвращает всё дерево исследований, предоставляя список всех исследовательских
    проектов и их детали, включая пререквизиты и уровни технологий.
    Это можно использовать для визуализации или анализа прогресса исследований.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/research/tree'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "projects": [
                {
                    "name": "basic_research",
                    "label": "basic research",
                    "progress": 0,
                    "research_points": 500,
                    "description": "unlocks basic research capabilities.",
                    "is_finished": true,
                    "can_start_now": false,
                    "player_has_any_appropriate_research_bench": true,
                    "required_analyzed_thing_count": 0,
                    "analyzed_things_completed": 0,
                    "tech_level": "neolithic",
                    "prerequisites": [],
                    "hidden_prerequisites": [],
                    "required_by_this": ["electricity", "stonecutting"],
                    "progress_percent": 1.0
                },
                {
                    "name": "electricity",
                    "label": "electricity",
                    "progress": 0,
                    "research_points": 1000,
                    "description": "unlocks electrical power generation and basic electrical devices.",
                    "is_finished": false,
                    "can_start_now": true,
                    "player_has_any_appropriate_research_bench": true,
                    "required_analyzed_thing_count": 0,
                    "analyzed_things_completed": 0,
                    "tech_level": "industrial",
                    "prerequisites": ["basic_research"],
                    "hidden_prerequisites": [],
                    "required_by_this": ["microelectronics"],
                    "progress_percent": 0.0
                }
            ]
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12T10:00:00.0000000Z"
    }
    ```
  method: GET
/api/v1/research/project:
  desc: |-
    Возвращает подробную информацию о конкретном исследовательском проекте
    по его имени. Это включает в себя его прогресс, пререквизиты,
    уровень технологий и описание.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/research/project?name=Microelectronics'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "name": "Microelectronics",
            "label": "Microelectronics",
            "progress": 500,
            "research_points": 3000,
            "description": "build advanced components and electronics.",
            "is_finished": false,
            "can_start_now": true,
            "player_has_any_appropriate_research_bench": true,
            "required_analyzed_thing_count": 0,
            "analyzed_things_completed": 0,
            "tech_level": "Industrial",
            "prerequisites": ["Electricity"],
            "hidden_prerequisites": [],
            "required_by_this": ["Fabrication", "AdvancedMachining"],
            "progress_percent": 0.16666667
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12t10:00:00.0000000z"
    }
    ```
  method: GET
/api/v1/research/summary:
  desc: |-
    Предоставляет высокоуровневую сводку о состоянии исследований игрока,
    включая количество завершенных, общее количество и доступные проекты,
    а также категоризацию по уровню технологий и вкладкам исследований.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/research/summary'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "finished_projects_count": 3,
            "total_projects_count": 50,
            "available_projects_count": 15,
            "by_tech_level": {
                "neolithic": {
                    "finished": 1,
                    "total": 5,
                    "percent_complete": 20.0,
                    "projects": ["BasicResearch"]
                },
                "industrial": {
                    "finished": 2,
                    "total": 10,
                    "percent_complete": 20.0,
                    "projects": ["Electricity", "Stonecutting"]
                }
            },
            "by_tab": {
                "basic": {
                    "finished": 2,
                    "total": 10,
                    "percent_complete": 20.0,
                    "projects": ["BasicResearch", "Stonecutting"]
                },
                "power": {
                    "finished": 1,
                    "total": 5,
                    "percent_complete": 20.0,
                    "projects": ["electricity"]
                }
            }
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12T10:00:00.0000000Z"
    }
    ```
  method: GET

/api/v1/research/target:
  desc: Устанавливает активный исследовательский проект колонии по его `defName`. Это немедленно перенаправляет фокус исследований колонии.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/research/target?name=Electricity&force=false'
    ```
  request: ""
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "finished_projects_count": 3,
            "total_projects_count": 50,
            "available_projects_count": 15,
            "by_tech_level": {
                "neolithic": {
                    "finished": 1,
                    "total": 5,
                    "percent_complete": 20.0,
                    "projects": ["BasicResearch"]
                },
                "industrial": {
                    "finished": 2,
                    "total": 10,
                    "percent_complete": 20.0,
                    "projects": ["Electricity", "Stonecutting"]
                }
            },
            "by_tab": {
                "basic": {
                    "finished": 2,
                    "total": 10,
                    "percent_complete": 20.0,
                    "projects": ["BasicResearch", "Stonecutting"]
                },
                "power": {
                    "finished": 1,
                    "total": 5,
                    "percent_complete": 20.0,
                    "projects": ["electricity"]
                }
            }
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2026-03-28T16:10:00.0000000Z"
    }
    ```
  method: POST
  csharp_method: SetResearchTarget

/api/v1/research/stop:
  desc: |-
    Останавливает текущий активный исследовательский проект колонии. Это снимает фокус 
    исследования и возвращает состояние проекта, который был остановлен. Возвращает ошибку, если в данный момент нет активных исследований.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/research/stop'
    ```
  request: ""
  response: |-
    **Response:**
    ```json
    {
      "success": true,
      "errors": [],
      "warnings": [],
      "timestamp": "2026-02-18T13:22:46.312391Z"
    }
    ```
  method: POST
  csharp_method: StopCurrentProject
