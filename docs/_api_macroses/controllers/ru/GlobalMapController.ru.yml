  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url "http://localhost:8765/api/v1/world/caravan/path?caravan_id=12"
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "id": 12,
            "moving": true,
