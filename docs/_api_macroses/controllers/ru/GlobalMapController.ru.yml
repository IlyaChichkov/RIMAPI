/api/v1/world/tile:
  desc: |-
    Возвращает подробную экологическую и географическую информацию о конкретном секторе мира (tile) на основе его ID.
    Возвращает данные о биоме, температуре, высоте над уровнем моря, а также о дорогах и реках.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url "http://localhost:8765/api/v1/world/tile?id=12345"
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "id": 232,
            "biome": "Tundra",
            "elevation": 1592.0,
            "temperature": -4.1,
            "rainfall": 269.0,
            "hilliness": "SmallHills",
            "roads": [
                "DirtRoad",
                "DirtRoad"
            ]
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-13T11:05:29.488063Z"
    }
    ```
  method: GET
/api/v1/world/caravan/path:
