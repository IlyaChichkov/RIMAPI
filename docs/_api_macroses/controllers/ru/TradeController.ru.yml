title: '### :material-store: Торговля'
desc: |-
  Предоставляет доступ к экономике игры и торговым системам. Этот контроллер обрабатывает
  определения для различных типов торговцев (орбитальные, караваны, посетители), позволяя вам
  анализировать их правила генерации товаров, распространенность предметов и поведение при покупке/продаже.

  **Возможности:**

  * Список всех глобальных типов торговцев (Defs).
  * Проверка логики генерации товаров (конкретные предметы, категории или теги).
  * Определение того, является ли тип торговца орбитальным или наземным.
/api/v1/traders/defs:
  desc: Возвращает список всех определений торговцев (TraderKindDefs). Сюда входят орбитальные торговцы, караваны и посетители, с подробным описанием их правил генерации товаров, распространенности и того, покупают ли они определенные категории предметов.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url http://localhost:8765/api/v1/traders/defs
    ```
  request: ''
  response: |-
