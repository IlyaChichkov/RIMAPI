title: '### :material-camera: Камера'
desc: |-
  Предоставляет конечные точки для управления видом пользователя в игре.
  Позволяет внешним инструментам панорамировать камеру по конкретным координатам или программно настраивать уровень масштабирования.
/api/v1/camera/change/zoom:
  desc: |-
    Настраивает уровень масштабирования игровой камеры на указанное значение,
    мгновенно изменяя поле зрения. Это позволяет точно
    контролировать, насколько близко или далеко находится камера на игровой карте.
  method: POST
  tags:
  - UI
  - Camera
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/camera/change/zoom?zoom=15'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
    "success": true,
    "errors": [],
    "warnings": [],
    "timestamp": "2025-12-09T19:16:06.4839322Z"
    }
    ```
/api/v1/camera/change/position:
  desc: Мгновенно перемещает игровую камеру на указанные мировые координаты на текущей карте.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/camera/change/position?x=50&y=50'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/stream/start:
  desc: |-
    Запускает прямую видеотрансляцию текущего вида камеры игры.
    Эта конечная точка инициирует трансляцию игрового процесса в реальном времени,
    захватывая именно то, что видно в основном окне игрока.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/stream/start'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/stream/stop:
  desc: Корректно останавливает активную прямую видеотрансляцию вида камеры игры.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/stream/stop'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/stream/setup:
  desc: |-
    Настраивает параметры и установки для прямой видеотрансляции
    вида камеры игры перед ее запуском.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/stream/setup?ip=127.0.0.1&port=5007&frame_width=1920&frame_height=1080&fps=15&quality=30'
    ```
  request: |-
    **Request:**
    ```json
    {
        "port": 8080,
        "address": "127.0.0.1",
        "frame_width": 1280,
        "frame_height": 720,
        "target_fps": 30,
        "jpeg_quality": 85
    }
    ```
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-08T19:13:29.997162Z"
    }
    ```
  method: POST
/api/v1/stream/status:
  desc: Получить статус текущей прямой видеотрансляции вида камеры игры.
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url 'http://localhost:8765/api/v1/stream/status'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
    "success": true,
    "data": {
        "is_streaming": false,
        "config": {
        "port": 5007,
        "address": "127.0.0.1",
        "frame_width": 1280,
        "frame_height": 720,
        "target_fps": 15,
        "jpeg_quality": 50
        }
    },
    "errors": [],
    "warnings": [],
    "timestamp": "2025-12-09T19:31:56.8297247Z"
    }
    ```
  method: GET
