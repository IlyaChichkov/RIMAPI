/api/v1/resources/storages/summary:
  desc: |-
    Предоставляет сводку по всем складским зонам (склады и свалки)
    на указанной карте, включая общее количество складов, общее количество клеток,
    занятые клетки и процент использования.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/resources/storages/summary?map_id=0'
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "total_stockpiles": 5,
            "total_cells": 200,
            "used_cells": 120,
            "utilization_percent": 60
        },
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-12T10:00:00.0000000Z"
    }
    ```
  method: GET
/api/v1/item/spawn:
  desc: Создает (спавнит) предмет на карте в выбранной позиции.
  method: POST
  curl: |-
    **Example:**
    ```bash
    curl --request POST \
    --url http://localhost:8765/api/v1/item/spawn \
    --header 'content-type: application/json' \
    --data '{
        "def_name": "BilliardsTable",
        "stuff_def_name": "WoodLog",
        "quality": "Legendary",
        "amount": 1,
        "x": 120,
        "z": 106
    }'
    ```
  request: |-
    **Request:**
    ```json
    {
        "def_name": "BilliardsTable",
        "stuff_def_name": "WoodLog",
        "quality": "Legendary",
        "amount": 1,
        "x": 120,
        "z": 106
    }
    ```
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "errors": [],
        "warnings": [],
        "timestamp": "2025-12-10T19:53:16.733319Z"
    }
    ```
