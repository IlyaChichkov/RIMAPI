title: '### :material-cube-outline: Объекты (Things)'
desc: |-
  Контроллер **Thing Controller** управляет физическими объектами в игровом мире, которые *не*
  являются гуманоидами (пешками). В коде RimWorld почти всё является "Объектом" (Thing).

  **Включает:**

  *   **Предметы:** Оружие, ресурсы, одежда.
  *   **Постройки:** Стены, мебель, верстаки.
  *   **Растения:** Сельскохозяйственные культуры, деревья.
/api/v1/item/recipes:
  desc: Возвращает рецепты крафта, связанные с конкретным предметом. Это включает подробности об ингредиентах, объеме работы, необходимых навыках и производственных станциях.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url "http://localhost:8765/api/v1/item/recipes?def_name=MealSimple"
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "item_def_name": "MealSimple",
            "item_label": "simple meal",
            "recipes": [
                {
                    "recipe_def_name": "CookMealSimple",
                    "label": "cook simple meal",
                    "job_string": "Cooking simple meal.",
                    "work_amount": 300.0,
                    "work_time_seconds": 5.0,
                    "ingredients": [
                        {
                            "summary": "Raw food",
                            "count": 0.5,
                            "is_fixed_item": false,
                            "allowed_def_names": [
                                "RawPotatoes",
                                "RawRice",
                                "Meat_Chicken"
                            ]
                        }
                    ],
                    "produced_at": [
                        {
                            "def_name": "ElectricStove",
                            "label": "electric stove"
                        },
                        {
                            "def_name": "FueledStove",
                            "label": "fueled stove"
                        },
                        {
                            "def_name": "Campfire",
                            "label": "campfire"
                        }
                    ],
                    "skill_requirements": [
                        {
                            "skill": "Cooking",
                            "min_level": 0
                        }
                    ],
                    "research_prerequisite": null
                }
            ]
        },
        "timestamp": "2025-12-11T19:46:05.7088803Z"
    }
    ```
  method: GET
/api/v1/item/sources:
  desc: Определяет различные способы получения конкретного предмета в игре. Сюда входят флаги для широких категорий (добыча, торговля, крафт) и конкретные детали, такие как названия руд или растений, производящих этот предмет.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url "http://localhost:8765/api/v1/item/sources?def_name=Steel"
    ```
  request: ''
  response: |-
    **Response:**
    ```json
    {
        "success": true,
        "data": {
            "def_name": "Steel",
            "label": "steel",
            "thing_categories": [
                "ResourcesRaw",
                "Resources"
            ],
            "can_craft": true,
            "can_trade": true,
            "can_harvest": false,
            "can_mine": true,
            "can_butcher": false,
            "crafting_recipes": [
                "SmeltWeapon",
                "SmeltApparel",
                "ExtractMetalFromSlag"
            ],
            "harvested_from": [],
            "mined_from": [
                "MineableSteel"
            ],
            "trade_tags": [
                "BulkGoods",
                "ExoticMisc"
            ]
        },
        "timestamp": "2025-12-11T19:46:05.7088803Z"
    }
    ```
  method: GET
/api/v1/resources/summary:
  desc: |-
    Возвращает исчерпывающую сводку по всем ресурсам, присутствующим на
    указанной карте, включая общее количество предметов, общую рыночную стоимость
    и категоризированную разбивку ресурсов. Также выделяет критические
    ресурсы, такие как еда, медикаменты и оружие.
  curl: |-
    **Example:**
    ```bash
    curl --request GET \
    --url 'http://localhost:8765/api/v1/resources/summary?map_id=0'
    ```
