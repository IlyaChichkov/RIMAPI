/api/v1/resources/stored:
  desc: |-
    Возвращает подробный список всех предметов, хранящихся в данный момент на указанной
    карте. Опционально результаты могут быть отфильтрованы по категории ресурсов. Этот
    эндпоинт предоставляет детализированную информацию о каждом хранящемся предмете,
    включая его ID, техническое имя (defName), этикетку и количество в стаке.
  curl: |-
    **Example:**
    ```bash
    # Get all stored resources
    curl --request GET \
    --url 'http://localhost:8765/api/v1/resources/stored?map_id=0'

    # Get stored resources by category
    curl --request GET \
    --url 'http://localhost:8765/api/v1/resources/stored?map_id=0&category=Foods'
    ```
