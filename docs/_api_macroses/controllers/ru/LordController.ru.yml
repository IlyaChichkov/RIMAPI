title: '### :material-chess-king: Lord Controller'
desc: |-
  **Lord Controller** отвечает за управление лордами ИИ (AI Lords), которые являются
  высокоуровневыми структурами ИИ, управляющими группами пешек.
/api/v1/lords/create:
  desc: Создать новый Lord ИИ с указанной задачей.
  curl: ''
  request: |-
    **Request:**
    ```json
    {
        "faction": "AncientsHostile",
        "pawn_ids": [39395],
        "job_type": "AssaultThings",
        "target_ids": [39387]
    }
    ```
  response: |-
    **Response:**
    ```json
    {
        "success":true,
        "data":
        {
            "lord_id":0,
            "member_count":1
        },
        "errors":[],
        "warnings":[],
        "timestamp":"2025-12-31T11:39:54.3651293Z"
    }
    ```
  method: POST
